<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生日快乐 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff6b9d;--primary-light:#ffb3cc;--primary-dark:#e8527f;
  --bg:#fff5f8;--card-bg:rgba(255,255,255,0.92);
  --text:#2d2d2d;--text-secondary:#888;
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,0.08);
  --theme-color:#ff6b9d;
}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* ===== Animated Background ===== */
.bg-decor{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-decor .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat 12s ease-in-out infinite}
.bg-decor .orb:nth-child(1){width:300px;height:300px;background:var(--theme-color);top:-80px;left:-60px;animation-delay:0s}
.bg-decor .orb:nth-child(2){width:250px;height:250px;background:var(--theme-color);bottom:-50px;right:-40px;animation-delay:-4s;opacity:.25}
.bg-decor .orb:nth-child(3){width:200px;height:200px;background:var(--theme-color);top:40%;left:60%;animation-delay:-8s;opacity:.2}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

/* ===== Layout ===== */
.app{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

/* ===== Header ===== */
.header{text-align:center;margin-bottom:24px;width:100%;max-width:480px}
.header h1{font-family:'ZCOOL KuaiLe',cursive;font-size:28px;color:var(--theme-color);margin-bottom:4px;transition:color .3s}
.header p{font-size:13px;color:var(--text-secondary)}
.header .nav-links{display:flex;justify-content:center;gap:16px;margin-top:8px}
.header .nav-links a{font-size:12px;color:var(--theme-color);text-decoration:none;opacity:.7;transition:opacity .2s}
.header .nav-links a:hover{opacity:1}

/* ===== Card ===== */
.card{width:100%;max-width:480px;background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.6);padding:28px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--theme-color),var(--theme-color));transition:background .3s}

/* ===== Form ===== */
.form-title{font-family:'ZCOOL KuaiLe',cursive;font-size:22px;text-align:center;margin-bottom:20px;color:var(--theme-color)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.form-group label .req{color:#ff4757;margin-left:2px}
.form-input{width:100%;height:44px;border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;transition:all .25s}
.form-input:focus{border-color:var(--theme-color);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,0.1)}
.form-input::placeholder{color:#bbb}
.birthday-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.birthday-trigger .arrow{font-size:12px;color:#999;transition:transform .2s}

/* ===== Theme Colors ===== */
.theme-colors{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.theme-color-item{text-align:center}
.theme-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .25s;position:relative}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--text);transform:scale(1.15)}
.theme-dot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.theme-label{font-size:10px;color:#999;margin-top:4px}

/* ===== Blessing ===== */
.blessing-area{position:relative}
.blessing-textarea{width:100%;min-height:80px;border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;resize:vertical;transition:all .25s;line-height:1.6}
.blessing-textarea:focus{border-color:var(--theme-color);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,0.1)}
.blessing-btns{display:flex;gap:8px;margin-top:6px}
.blessing-btns button{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:var(--text-secondary);cursor:pointer;transition:all .2s;font-family:inherit}
.blessing-btns button:hover{border-color:var(--theme-color);color:var(--theme-color)}

/* ===== Submit Button ===== */
.submit-btn{width:100%;height:50px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--theme-color),var(--theme-color));color:#fff;font-size:17px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;letter-spacing:2px;transition:all .3s;box-shadow:0 4px 16px rgba(255,107,157,0.3);position:relative;overflow:hidden}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,107,157,0.4)}
.submit-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(255,107,157,0.3)}
.submit-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.2) 50%,transparent 70%);transform:translateX(-100%);transition:none}
.submit-btn:hover::after{transform:translateX(100%);transition:transform .6s}

/* ===== Result Section ===== */
.result-section{margin-top:24px;display:none;text-align:center}
.result-section.show{display:block;animation:fadeUp .5s ease}
.result-tip{font-size:13px;color:var(--theme-color);margin-bottom:16px;line-height:1.6}
.result-card{width:100%;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:relative;background:#fff}
.result-card canvas{display:block;width:100%;height:auto}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.result-actions button{width:100%;height:46px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-download{background:var(--theme-color);color:#fff;box-shadow:0 4px 12px rgba(255,107,157,0.25)}
.btn-download:hover{opacity:.9;transform:translateY(-1px)}
.btn-copy{background:#fff;color:var(--theme-color);border:1.5px solid var(--theme-color)}
.btn-copy:hover{background:rgba(255,107,157,0.05)}
.qrcode-wrap{margin-top:20px;padding:20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);display:inline-block}
.qrcode-wrap p{font-size:13px;color:#999;margin-bottom:10px}
.qrcode-wrap canvas,.qrcode-wrap img{display:block;margin:0 auto}
.qrcode-wrap .qr-tip{font-size:11px;color:#bbb;margin-top:8px}

/* ===== Wheel Picker ===== */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.picker-overlay.show{display:flex;animation:fadeIn .2s ease}
.picker-panel{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px 0 0;animation:slideUp .3s ease}
.picker-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px 16px;border-bottom:1px solid #f0f0f0}
.picker-header h3{font-size:16px;font-weight:500}
.picker-cancel,.picker-confirm{background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px}
.picker-cancel{color:#999}.picker-confirm{color:var(--theme-color);font-weight:600}
.picker-body{display:flex;height:220px;position:relative;padding:0 10px}
.picker-body::before{content:'';position:absolute;left:10px;right:10px;top:66px;height:44px;border-top:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;background:rgba(255,107,157,0.04);z-index:2;pointer-events:none;border-radius:8px}
.picker-column{flex:1;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;position:relative}
.picker-column::-webkit-scrollbar{display:none}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#999;scroll-snap-align:center;cursor:pointer;transition:all .15s;user-select:none}
.picker-sep{max-width:30px;flex:none;display:flex;align-items:center;justify-content:center}
.picker-sep span{color:#999;font-size:16px}
.picker-padding{height:88px}

/* ===== History ===== */
.history-btn{position:fixed;bottom:24px;left:20px;z-index:50;width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.1);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.history-btn:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.history-panel{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.history-panel.show{display:flex;animation:fadeIn .2s ease}
.history-content{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease}
.history-content h3{font-size:16px;font-weight:600;margin-bottom:4px}
.history-content .sub{font-size:12px;color:#999;margin-bottom:16px}
.history-item{display:flex;align-items:center;padding:12px;border-radius:var(--radius-sm);background:#fafafa;margin-bottom:8px;cursor:pointer;transition:all .2s}
.history-item:hover{background:#f0f0f0}
.history-item .info{flex:1;min-width:0}
.history-item .name{font-size:14px;font-weight:500}
.history-item .date{font-size:12px;color:#999}
.history-item .del-btn{width:32px;height:32px;border:none;background:none;color:#ccc;font-size:16px;cursor:pointer;border-radius:50%;transition:all .2s}
.history-item .del-btn:hover{background:#fee;color:#ff4757}
.history-empty{text-align:center;padding:30px;color:#ccc;font-size:14px}
.history-close{display:block;width:100%;height:44px;border:none;background:none;color:#999;font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit}

/* ===== Toast ===== */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ===== Footer ===== */
.footer{width:100%;max-width:480px;text-align:center;margin-top:32px;padding:20px 0;border-top:1px solid rgba(0,0,0,0.05)}
.footer .brand{font-family:'ZCOOL KuaiLe',cursive;font-size:18px;color:var(--theme-color);margin-bottom:8px}
.footer .desc{font-size:12px;color:#bbb;line-height:1.6;margin-bottom:16px}
.footer-links{display:flex;justify-content:center;gap:20px;margin-bottom:16px}
.footer-links a{font-size:12px;color:#999;text-decoration:none}
.footer-copy{font-size:11px;color:#ccc}

/* ============================= */
/* ===== DISPLAY MODE ========== */
/* ============================= */
#displayMode{display:none;position:fixed;inset:0;z-index:1000;background:#000}
#displayMode.show{display:block}
#displayCanvas{position:absolute;inset:0;width:100%;height:100%}
.display-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;z-index:2;pointer-events:none}
.display-greeting{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(36px,10vw,64px);color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.3);opacity:0;animation:none;margin-bottom:10px}
.display-name{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(28px,7vw,48px);color:#fff;text-shadow:0 3px 15px rgba(0,0,0,0.3);opacity:0;margin-bottom:8px}
.display-date{font-size:clamp(16px,4vw,24px);color:rgba(255,255,255,0.8);opacity:0;margin-bottom:40px}
.display-blessing{font-size:clamp(16px,3.5vw,22px);color:rgba(255,255,255,0.95);line-height:1.8;max-width:500px;opacity:0;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
.display-sender{font-size:clamp(14px,3vw,18px);color:rgba(255,255,255,0.6);margin-top:30px;opacity:0}
.display-cake{font-size:clamp(60px,15vw,100px);opacity:0;margin-bottom:20px}
.display-replay{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:3;pointer-events:auto;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:10px 28px;border-radius:24px;font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;opacity:0}
.display-replay:hover{background:rgba(255,255,255,0.25)}
.display-replay.show{opacity:1}
.display-music{position:absolute;top:20px;right:20px;z-index:3;pointer-events:auto;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.display-music:hover{background:rgba(255,255,255,0.25)}
.display-music.playing{animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ===== Animations ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.3)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ===== Responsive ===== */
@media(min-width:600px){.app{padding:40px 20px 60px}.card{padding:36px 32px}}
@media(max-width:360px){.header h1{font-size:22px}.card{padding:20px 16px}.theme-dot{width:32px;height:32px}}
</style>
</head>
<body>

<!-- ===== EDIT MODE ===== -->
<div class="bg-decor"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app" id="editMode">
  <header class="header">
    <h1>🎂 生日快乐</h1>
    <p>数字糖果铺🍬 · 用数字传递最温暖的情感</p>
    <div class="nav-links"><a href="#">首页</a><a href="#">更多产品</a></div>
  </header>

  <div class="card">
    <div class="form-title">🎈 生日贺卡生成器</div>

    <div class="form-group">
      <label>寿星昵称 <span class="req">*</span></label>
      <input type="text" class="form-input" id="nameInput" placeholder="输入Ta的名字" maxlength="20">
    </div>

    <div class="form-group">
      <label>生日 <span class="req">*</span></label>
      <div class="form-input birthday-trigger" id="birthdayTrigger" tabindex="0">
        <span id="birthdayDisplay" style="color:#bbb">选择日期</span>
        <span class="arrow">▼</span>
      </div>
    </div>

    <div class="form-group">
      <label>发送人昵称 <span class="req">*</span></label>
      <input type="text" class="form-input" id="senderInput" placeholder="你的名字" maxlength="20">
    </div>

    <div class="form-group">
      <label>主题色</label>
      <div class="theme-colors" id="themeColors"></div>
    </div>

    <div class="form-group">
      <label>祝福语</label>
      <div class="blessing-area">
        <textarea class="blessing-textarea" id="blessingInput" placeholder="写下你的祝福..." maxlength="200"></textarea>
        <div class="blessing-btns">
          <button id="rotateBlessing">🔄 换一条</button>
          <button id="clearBlessing">✕ 清空</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Ta的邮箱（选填）</label>
      <input type="email" class="form-input" id="emailInput" placeholder="example@mail.com">
    </div>

    <button class="submit-btn" id="generateBtn">✨ 立即生成 ✨</button>

    <div class="result-section" id="resultSection">
      <p class="result-tip">🎉 请保存贺卡图片和链接，用于分享和预览！</p>
      <div class="result-card" id="resultCard">
        <canvas id="cardCanvas" width="600" height="1050"></canvas>
      </div>
      <div class="result-actions">
        <button class="btn-download" id="downloadBtn">📥 下载贺卡图片（含二维码）</button>
        <button class="btn-copy" id="copyBtn">🔗 复制链接</button>
      </div>
      <div class="qrcode-wrap" id="qrcodeWrap">
        <p>📱 扫码查看生日祝福</p>
        <div id="qrcodeEl"></div>
        <div class="qr-tip">长按二维码可保存图片</div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="brand">数字糖果铺🍬</div>
    <div class="desc">用数字传递最温暖的情感<br>让每一个特殊时刻都充满惊喜与感动</div>
    <div class="footer-links"><a href="#">首页</a><a href="#">更多产品</a><a href="#">隐私协议</a></div>
    <div class="footer-copy">Copyright © 2025 数字糖果铺🍬</div>
  </footer>
</div>

<!-- ===== DISPLAY MODE ===== -->
<div id="displayMode">
  <canvas id="displayCanvas"></canvas>
  <div class="display-content">
    <div class="display-cake" id="dCake">🎂</div>
    <div class="display-greeting" id="dGreeting">生日快乐！</div>
    <div class="display-name" id="dName"></div>
    <div class="display-date" id="dDate"></div>
    <div class="display-blessing" id="dBlessing"></div>
    <div class="display-sender" id="dSender"></div>
  </div>
  <button class="display-replay" id="displayReplay">🔄 再看一次</button>
  <button class="display-music" id="displayMusic" title="音乐">🎵</button>
</div>

<!-- Birthday Wheel Picker -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-panel">
    <div class="picker-header">
      <button class="picker-cancel" id="pickerCancel">取消</button>
      <h3>选择生日（月 / 日）</h3>
      <button class="picker-confirm" id="pickerConfirm">确定</button>
    </div>
    <div class="picker-body">
      <div class="picker-column" id="monthColumn"></div>
      <div class="picker-sep"><span>/</span></div>
      <div class="picker-column" id="dayColumn"></div>
    </div>
  </div>
</div>

<!-- History -->
<button class="history-btn" id="historyBtn">📋</button>
<div class="history-panel" id="historyPanel">
  <div class="history-content">
    <h3>📌 我的制作</h3>
    <div class="sub">已生成的祝福卡记录，可快速重新打开</div>
    <div id="historyList"></div>
    <button class="history-close" id="historyClose">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ===== Theme Colors =====
const THEMES=[
  {name:'樱桃粉',color:'#ff6b9d',light:'#ffb3cc',dark:'#e8527f',gradient:'linear-gradient(135deg,#ff6b9d,#ff8fab)',canvasGrad:['#ffb3cc','#ff6b9d','#e8527f']},
  {name:'天空蓝',color:'#4facfe',light:'#a0d2ff',dark:'#2d8cf0',gradient:'linear-gradient(135deg,#4facfe,#00f2fe)',canvasGrad:['#a0d2ff','#4facfe','#2d8cf0']},
  {name:'中国红',color:'#e74c3c',light:'#ff8a80',dark:'#c0392b',gradient:'linear-gradient(135deg,#e74c3c,#ff6b6b)',canvasGrad:['#ff8a80','#e74c3c','#c0392b']},
  {name:'提夫尼蓝',color:'#0abde3',light:'#7ee8ff',dark:'#0097b2',gradient:'linear-gradient(135deg,#0abde3,#48dbfb)',canvasGrad:['#7ee8ff','#0abde3','#0097b2']},
  {name:'牛油果绿',color:'#2ed573',light:'#7bed9f',dark:'#20bf6b',gradient:'linear-gradient(135deg,#2ed573,#7bed9f)',canvasGrad:['#7bed9f','#2ed573','#20bf6b']},
  {name:'爱马仕橙',color:'#ff9f43',light:'#ffcb80',dark:'#ee7600',gradient:'linear-gradient(135deg,#ff9f43,#f6b93b)',canvasGrad:['#ffcb80','#ff9f43','#ee7600']},
  {name:'玫瑰紫',color:'#a55eea',light:'#cd9cff',dark:'#8854d0',gradient:'linear-gradient(135deg,#a55eea,#cd84f1)',canvasGrad:['#cd9cff','#a55eea','#8854d0']},
  {name:'柠檬黄',color:'#fed330',light:'#fff59d',dark:'#f7b731',gradient:'linear-gradient(135deg,#fed330,#fff200)',canvasGrad:['#fff59d','#fed330','#f7b731']}

// ===== Init Theme Colors =====
function initThemes(){
  THEMES.forEach((t,i)=>{
    const wrap=document.createElement('div');
    wrap.className='theme-color-item';
    const dot=document.createElement('div');
    dot.className='theme-dot'+(i===0?' active':'');
    dot.style.background=t.gradient;
    dot.title=t.name;
    dot.addEventListener('click',()=>selectTheme(i));
    const label=document.createElement('div');
    label.className='theme-label';
    label.textContent=t.name;
    wrap.appendChild(dot);wrap.appendChild(label);
    themeColorsEl.appendChild(wrap);
  });
}

function selectTheme(i){
  currentTheme=i;
  const t=THEMES[i];
  document.documentElement.style.setProperty('--theme-color',t.color);
  document.querySelectorAll('.theme-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  const btn=document.querySelector('.submit-btn');
  if(btn){btn.style.background=t.gradient;btn.style.boxShadow=`0 4px 16px ${t.color}44`}
}

// ===== Wheel Picker =====
function getDaysInMonth(m){return[31,29,31,30,31,30,31,31,30,31,30,31][m-1]}

function buildPicker(){
  monthColumn.innerHTML='';dayColumn.innerHTML='';
  const mkPad=()=>{const d=document.createElement('div');d.className='picker-padding';return d};
  monthColumn.appendChild(mkPad());
  for(let m=1;m<=12;m++){const d=document.createElement('div');d.className='picker-item';d.textContent=String(m).padStart(2,'0');d.dataset.val=m;monthColumn.appendChild(d)}
  monthColumn.appendChild(mkPad());
  dayColumn.appendChild(mkPad());
  const dim=getDaysInMonth(pickerMonth);
  for(let d=1;d<=dim;d++){const el=document.createElement('div');el.className='picker-item';el.textContent=String(d).padStart(2,'0');el.dataset.val=d;dayColumn.appendChild(el)}
  dayColumn.appendChild(mkPad());
}

function scrollPicker(col,val){
  col.querySelectorAll('.picker-item').forEach(it=>{it.style.color='';it.style.fontWeight=''});
  const items=[...col.querySelectorAll('.picker-item')];
  const target=items.find(it=>it.dataset.val==val);
  if(target){
    col.scrollTop=target.offsetTop-44*1.5+22;
    target.style.color='var(--theme-color)';target.style.fontWeight='600';
  }
}

function readPickerCol(col){
  const items=[...col.querySelectorAll('.picker-item')];
  const center=col.scrollTop+col.clientHeight/2;
  let best=items[0],minDist=Infinity;
  items.forEach(it=>{const d=Math.abs(it.offsetTop+22-center);if(d<minDist){minDist=d;best=it}});
  return parseInt(best.dataset.val)||1;
}

let mTimer,dTimer;
function onPickerScroll(col,type){
  clearTimeout(type==='month'?mTimer:dTimer);
  const t=setTimeout(()=>{
    const val=readPickerCol(col);
    if(type==='month'){
      pickerMonth=val;
      const oldDay=pickerDay;dayColumn.innerHTML='';
      const mkPad=()=>{const d=document.createElement('div');d.className='picker-padding';return d};
      dayColumn.appendChild(mkPad());
      const dim=getDaysInMonth(val);
      for(let d=1;d<=dim;d++){const el=document.createElement('div');el.className='picker-item';el.textContent=String(d).padStart(2,'0');el.dataset.val=d;dayColumn.appendChild(el)}
      dayColumn.appendChild(mkPad());
      pickerDay=Math.min(oldDay,dim);
      scrollPicker(dayColumn,pickerDay);
    }else{pickerDay=val}
    highlightPicker();
  },80);
  if(type==='month')mTimer=t;else dTimer=t;
}

function highlightPicker(){
  monthColumn.querySelectorAll('.picker-item').forEach(it=>{
    const a=parseInt(it.dataset.val)===pickerMonth;
    it.style.color=a?'var(--theme-color)':'';it.style.fontWeight=a?'600':'';
  });
  dayColumn.querySelectorAll('.picker-item').forEach(it=>{
    const a=parseInt(it.dataset.val)===pickerDay;
    it.style.color=a?'var(--theme-color)':'';it.style.fontWeight=a?'600':'';
  });
}

function openPicker(){
  pickerMonth=selectedMonth;pickerDay=selectedDay;

  setTimeout(()=>{
    scrollPicker(monthColumn,pickerMonth);
    scrollPicker(dayColumn,pickerDay);
    monthColumn.onscroll=()=>onPickerScroll(monthColumn,'month');
    dayColumn.onscroll=()=>onPickerScroll(dayColumn,'day');
  },50);
}
function closePicker(){pickerOverlay.classList.remove('show');monthColumn.onscroll=null;dayColumn.onscroll=null}

function buildShareURL(){
  const n=encodeURIComponent(nameInput.value.trim());
  const s=encodeURIComponent(senderInput.value.trim());

  return `${location.origin}${location.pathname}?name=${n}&sender=${s}&month=${selectedMonth}&day=${selectedDay}&theme=${currentTheme}&blessing=${b}`;

// ===== Generate Card Image =====
function generateCard(){
  const name=nameInput.value.trim();
  const sender=senderInput.value.trim();
  if(!name){showToast('请输入寿星昵称');nameInput.focus();return}
  if(!sender){showToast('请输入发送人昵称');senderInput.focus();return}

  const t=THEMES[currentTheme];
  const blessing=blessingInput.value.trim()||BLESSINGS[blessingIndex%BLESSINGS.length];
  const canvas=cardCanvas;
  const ctx=canvas.getContext('2d');
  const W=600,H=1050;
  canvas.width=W;canvas.height=H;

  // BG gradient
  const bgGrad=ctx.createLinearGradient(0,0,W*0.5,H);
  bgGrad.addColorStop(0,t.canvasGrad[0]+'dd');
  bgGrad.addColorStop(0.5,t.canvasGrad[1]+'cc');
  bgGrad.addColorStop(1,t.canvasGrad[2]+'ee');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Decorative circles
  for(let i=0;i<25;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*W,Math.random()*H,Math.random()*50+10,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.12+0.04})`;ctx.fill();
  }

  // Stars top
  for(let i=0;i<35;i++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.3})`;
    drawStar(ctx,Math.random()*W,Math.random()*H*0.35,Math.random()*3+1);
  }

  // Decorative lines
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(40,70);ctx.lineTo(W-40,70);ctx.stroke();
  ctx.beginPath();ctx.moveTo(40,H-70);ctx.lineTo(W-40,H-70);ctx.stroke();

  // Cake
  drawCake(ctx,W/2,480,t);

  // Title
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='56px "ZCOOL KuaiLe",cursive';
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=12;ctx.shadowOffsetY=4;
  ctx.fillText('🎂 生日快乐！',W/2,140);
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;

  // Name
  ctx.font='44px "ZCOOL KuaiLe",cursive';
  ctx.fillStyle='#fff';
  ctx.fillText(`致：${name}`,W/2,220);

  // Date
  ctx.font='24px "Noto Sans SC",sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText(`${selectedMonth}月${selectedDay}日`,W/2,270);

  // Blessing
  ctx.font='20px "Noto Sans SC",sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.95)';
  wrapText(ctx,blessing,W/2,700,W-80,32);

  // Sender
  ctx.font='18px "Noto Sans SC",sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.fillText(`—— 来自 ${sender} 的祝福`,W/2,830);

  // QR Code at bottom
  const shareURL=buildShareURL();
  drawQRCodeOnCanvas(ctx,shareURL,W,H,t);

  // QR tip text
  ctx.font='13px "Noto Sans SC",sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('扫码打开，给Ta一个惊喜 🎉',W/2,H-40);

  // Show result
  resultSection.classList.add('show');
  resultSection.scrollIntoView({behavior:'smooth',block:'start'});

  // Generate standalone QR code below
  generateQRCode(shareURL);

  // Save history
  saveHistory(name,sender,selectedMonth,selectedDay,blessing,currentTheme);
}

function drawQRCodeOnCanvas(ctx,url,W,H,t){
  try{
    const qr=qrcode(0,'L');
    qr.addData(url);qr.make();
    const size=qr.getModuleCount();
    const cellSize=Math.floor(120/size);
    const qrSize=size*cellSize;
    const cx=W/2, cy=H-180;

    // White rounded background
    ctx.fillStyle='rgba(255,255,255,0.9)';
    roundRect(ctx,cx-qrSize/2-16,cy-qrSize/2-16,qrSize+32,qrSize+32,12);ctx.fill();

    // Draw modules
    for(let r=0;r<size;r++){
      for(let c=0;c<size;c++){
        if(qr.isDark(r,c)){
          ctx.fillStyle=t.canvasGrad[2];
          ctx.fillRect(cx-qrSize/2+c*cellSize,cy-qrSize/2+r*cellSize,cellSize,cellSize);
        }
      }
    }
  }catch(e){
    // fallback: just draw a hint
    ctx.font='16px "Noto Sans SC",sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.textAlign='center';
    ctx.fillText('链接已复制，发给你想祝福的人吧',W/2,H-150);
  }
}

function generateQRCode(url){
  const el=$('qrcodeEl');
  el.innerHTML='';
  try{
    const qr=qrcode(0,'M');
    qr.addData(url);qr.make();
    const size=qr.getModuleCount();
    const cell=Math.max(4,Math.floor(200/size));
    const canvas=document.createElement('canvas');
    canvas.width=size*cell;canvas.height=size*cell;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let r=0;r<size;r++){
      for(let c=0;c<size;c++){
        if(qr.isDark(r,c)){
          ctx.fillStyle=THEMES[currentTheme].canvasGrad[1];
          ctx.fillRect(c*cell,r*cell,cell,cell);
        }
      }
    }
    canvas.style.width='200px';canvas.style.height='200px';canvas.style.borderRadius='8px';
    el.appendChild(canvas);
  }catch(e){
    el.innerHTML='<p style="color:#999;font-size:12px">二维码生成失败</p>';
  }
}

function drawStar(ctx,x,y,r){
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI*2*i/5-Math.PI/2;
    const ax=x+Math.cos(a)*r,ay=y+Math.sin(a)*r;
    const b=a+Math.PI/5;
    const bx=x+Math.cos(b)*r*0.4,by=y+Math.sin(b)*r*0.4;
    if(i===0)ctx.moveTo(ax,ay);else ctx.lineTo(ax,ay);
    ctx.lineTo(bx,by);
  }
  ctx.closePath();ctx.fill();
}

function drawCake(ctx,cx,cy,t){
  // Plate
  ctx.beginPath();ctx.ellipse(cx,cy+80,90,18,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fill();

  // Bottom
  const g1=ctx.createLinearGradient(cx-70,cy,cx+70,cy);
  g1.addColorStop(0,t.canvasGrad[2]);g1.addColorStop(1,t.canvasGrad[1]);
  ctx.fillStyle=g1;roundRect(ctx,cx-70,cy,140,50,12);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=-60;i<60;i+=18){ctx.beginPath();ctx.arc(cx+i,cy+50,10,0,Math.PI);ctx.fill()}

  // Top
  const g2=ctx.createLinearGradient(cx-55,cy-45,cx+55,cy-45);
  g2.addColorStop(0,t.canvasGrad[1]);g2.addColorStop(1,t.canvasGrad[0]);
  ctx.fillStyle=g2;roundRect(ctx,cx-55,cy-45,110,45,10);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  for(let i=-45;i<45;i+=15){ctx.beginPath();ctx.arc(cx+i,cy,8,0,Math.PI);ctx.fill()}

  // Candles
  [cx-30,cx,cx+30].forEach((x,i)=>{
    ctx.fillStyle=i%2===0?'#fff':'#ffe8f0';
    roundRect(ctx,x-3,cy-85,6,40,2);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x,cy-95);ctx.quadraticCurveTo(x+8,cy-105,x,cy-115);ctx.quadraticCurveTo(x-8,cy-105,x,cy-95);
    ctx.fillStyle=i===1?'#ffeb3b':'#ff9800';ctx.fill();
    const glow=ctx.createRadialGradient(x,cy-105,0,x,cy-105,15);
    glow.addColorStop(0,'rgba(255,200,50,0.4)');glow.addColorStop(1,'rgba(255,200,50,0)');
    ctx.fillStyle=glow;ctx.fillRect(x-15,cy-120,30,30);
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  let line='',ly=y;
  for(const ch of text){
    const test=line+ch;
    if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,ly);line=ch;ly+=lineH}
    else line=test;
  }
  if(line)ctx.fillText(line,x,ly);
}

// ===== History =====
function getHistory(){try{return JSON.parse(localStorage.getItem('bd_history')||'[]')}catch{return[]}}
function saveHistory(name,sender,month,day,blessing,theme){
  const list=getHistory();
  list.unshift({name,sender,month,day,blessing,theme,time:Date.now()});
  if(list.length>20)list.length=20;
  localStorage.setItem('bd_history',JSON.stringify(list));
}
function renderHistory(){
  const list=getHistory();
  if(!list.length){historyList.innerHTML='<div class="history-empty">暂无记录</div>';return}
  historyList.innerHTML=list.map((it,i)=>`
    <div class="history-item" data-idx="${i}">
      <div class="info"><div class="name">🎂 ${it.name}</div><div class="date">${it.month}月${it.day}日 · 来自 ${it.sender}</div></div>
      <button class="del-btn" data-delidx="${i}">✕</button>
    </div>`).join('');
  historyList.querySelectorAll('.history-item').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.classList.contains('del-btn')){
        e.stopPropagation();const idx=parseInt(e.target.dataset.delidx);
        const list=getHistory();list.splice(idx,1);
        localStorage.setItem('bd_history',JSON.stringify(list));renderHistory();return;
      }
      const it=getHistory()[parseInt(el.dataset.idx)];if(!it)return;
      nameInput.value=it.name;senderInput.value=it.sender;
      selectedMonth=it.month;selectedDay=it.day;
      birthdayDisplay.textContent=`${String(it.month).padStart(2,'0')}月${String(it.day).padStart(2,'0')}日`;
      birthdayDisplay.style.color='var(--text)';
      blessingInput.value=it.blessing||'';
      if(it.theme!==undefined)selectTheme(it.theme);
      historyPanel.classList.remove('show');window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

historyClose.addEventListener('click',()=>historyPanel.classList.remove('show'));

let displayAnim=null;
let audioCtx=null;
let musicPlaying=false;

function startDisplayMode(){
  const name=urlParams.get('name')||'';
  const sender=urlParams.get('sender')||'';
  const month=parseInt(urlParams.get('month'))||1;
  const day=parseInt(urlParams.get('day'))||1;
  const themeIdx=parseInt(urlParams.get('theme'))||0;
  const blessing=urlParams.get('blessing')||'生日快乐！';

  const t=THEMES[themeIdx]||THEMES[0];
  selectTheme(themeIdx);

  // Hide edit, show display
  $('editMode').style.display='none';
  document.querySelector('.history-btn').style.display='none';
  document.querySelector('.bg-decor').style.display='none';
  const dm=$('displayMode');
  dm.classList.add('show');

  // Set text
  $('dName').textContent=`致：${name}`;
  $('dDate').textContent=`${month}月${day}日`;
  $('dBlessing').textContent=blessing;
  $('dSender').textContent=`—— 来自 ${sender} 的祝福`;

  // Start canvas animation
  const canvas=$('displayCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let W,H;

  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize',resize);

  // Particles
  const particles=[];
  const MAX_P=120;

  class Particle{
    constructor(type){
      this.type=type;this.reset();
    }
    reset(){
      this.x=Math.random()*W;this.y=-20-Math.random()*H*0.5;
      this.vx=(Math.random()-0.5)*1.5;this.vy=Math.random()*1.5+0.5;
      this.size=Math.random()*8+4;this.rotation=Math.random()*360;
      this.rotSpeed=(Math.random()-0.5)*4;
      this.opacity=Math.random()*0.5+0.5;
      this.life=1;
      if(this.type==='confetti'){
        this.color=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9ff3','#fff'][Math.floor(Math.random()*6)];
        this.shape=Math.random()>0.5?'rect':'circle';
      }else if(this.type==='heart'){
        this.color=t.canvasGrad[1];this.vy=Math.random()*0.8+0.3;this.size=Math.random()*12+6;
      }else if(this.type==='balloon'){
        this.color=[t.canvasGrad[0],t.canvasGrad[1],t.canvasGrad[2],'#ff6b6b','#ffd93d','#6bcb77'][Math.floor(Math.random()*6)];
        this.vy=-(Math.random()*0.6+0.3);this.vx=(Math.random()-0.5)*0.3;
        this.size=Math.random()*20+15;this.y=H+20+Math.random()*100;
      }else if(this.type==='firework'){
        this.color=t.canvasGrad[Math.floor(Math.random()*3)];
        this.life=1;this.decay=Math.random()*0.02+0.01;
        this.vy=Math.random()*2-1;this.vx=Math.random()*2-1;
        this.size=Math.random()*3+1;this.gravity=0.03;
      }else if(this.type==='star'){
        this.color='rgba(255,255,255,'+(Math.random()*0.5+0.3).toFixed(2)+')';
        this.size=Math.random()*3+1;this.vy=0;this.vx=0;
        this.twinkle=Math.random()*Math.PI*2;this.twinkleSpeed=Math.random()*0.05+0.02;
      }
    }
    update(){
      this.x+=this.vx;this.y+=this.vy;this.rotation+=this.rotSpeed;
      if(this.type==='balloon'){this.x+=Math.sin(Date.now()*0.002+this.x)*0.2;this.y+=this.vy;return this.y>-40}
      if(this.type==='firework'){
        this.vy+=this.gravity;this.life-=this.decay;
        return this.life>0;
      }
      if(this.type==='star'){
        this.twinkle+=this.twinkleSpeed;
        return true;
      }
      return this.y<H+20&&this.x>-20&&this.x<W+20;
    }
    draw(ctx){
      ctx.save();ctx.globalAlpha=this.opacity*this.life;
      ctx.translate(this.x,this.y);ctx.rotate(this.rotation*Math.PI/180);
      if(this.type==='confetti'){
        ctx.fillStyle=this.color;
        if(this.shape==='rect'){ctx.fillRect(-this.size/2,-this.size/4,this.size,this.size/2)}
        else{ctx.beginPath();ctx.arc(0,0,this.size/2,0,Math.PI*2);ctx.fill()}
      }else if(this.type==='heart'){
        drawHeart(ctx,0,0,this.size,this.color);
      }else if(this.type==='balloon'){
        drawBalloon(ctx,0,0,this.size,this.color);
      }else if(this.type==='firework'){
        ctx.fillStyle=this.color;ctx.beginPath();
        ctx.arc(0,0,this.size*this.life,0,Math.PI*2);ctx.fill();
      }else if(this.type==='star'){
        const alpha=0.5+Math.sin(this.twinkle)*0.3;
        ctx.globalAlpha=alpha;ctx.fillStyle='#fff';
        drawStar(ctx,0,0,this.size);
      }
      ctx.restore();
    }
  }

  function drawHeart(ctx,x,y,s,color){
    ctx.fillStyle=color;ctx.beginPath();
    const hs=s/2;
    ctx.moveTo(x,y+hs*0.3);
    ctx.bezierCurveTo(x,y-hs*0.3,x-hs,y-hs*0.3,x-hs,y+hs*0.1);
    ctx.bezierCurveTo(x-hs,y+hs*0.6,x,y+hs,x,y+hs);
    ctx.bezierCurveTo(x,y+hs,x+hs,y+hs*0.6,x+hs,y+hs*0.1);
    ctx.bezierCurveTo(x+hs,y-hs*0.3,x,y-hs*0.3,x,y+hs*0.3);
    ctx.fill();
  }

  function drawBalloon(ctx,x,y,s,color){
    ctx.fillStyle=color;ctx.beginPath();
    ctx.ellipse(x,y-s*0.4,s*0.4,s*0.5,0,0,Math.PI*2);ctx.fill();
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();
    ctx.ellipse(x-s*0.12,y-s*0.6,s*0.1,s*0.15,-0.3,0,Math.PI*2);ctx.fill();
    // string
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,y+s*0.1);ctx.quadraticCurveTo(x+3,y+s*0.3,x,y+s*0.5);ctx.stroke();
  }

  // Init background stars
  for(let i=0;i<50;i++){
    const p=new Particle('star');
    p.x=Math.random()*W;p.y=Math.random()*H;
    particles.push(p);
  }

  let frame=0;
  let fireworkTimer=0;
  let phase=0; // 0=fade in bg, 1=show text, 2=party

  function spawnFireworkBurst(cx,cy){
    const count=30+Math.floor(Math.random()*20);
    for(let i=0;i<count&&particles.length<MAX_P+count;i++){
      const p=new Particle('firework');
      p.x=cx;p.y=cy;
      const angle=Math.random()*Math.PI*2;
      const speed=Math.random()*3+1;
      p.vx=Math.cos(angle)*speed;p.vy=Math.sin(angle)*speed;
      particles.push(p);
    }
  }

  function animate(){
    frame++;
    ctx.clearRect(0,0,W,H);

    // BG gradient
    const bgGrad=ctx.createLinearGradient(0,0,W*0.3,H);
    bgGrad.addColorStop(0,t.canvasGrad[2]+'ee');
    bgGrad.addColorStop(0.5,t.canvasGrad[1]+'dd');
    bgGrad.addColorStop(1,t.canvasGrad[0]+'cc');
    ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

    // Phase transitions
    if(frame===1){phase=0}
    if(frame===30){phase=1;animateTextIn()}
    if(frame===90){phase=2}

    // Spawn confetti in party phase
    if(phase===2&&frame%3===0&&particles.length<MAX_P+60){
      particles.push(new Particle('confetti'));
    }
    // Hearts
    if(phase===2&&frame%8===0&&particles.length<MAX_P+60){
      particles.push(new Particle('heart'));
    }
    // Balloons
    if(phase===2&&frame%20===0&&particles.length<MAX_P+60){
      particles.push(new Particle('balloon'));
    }
    // Fireworks
    if(phase===2){
      fireworkTimer++;
      if(fireworkTimer%60===0){
        spawnFireworkBurst(W*0.2+Math.random()*W*0.6,H*0.15+Math.random()*H*0.3);
      }
    }

    // Update & draw particles
    for(let i=particles.length-1;i>=0;i--){
      if(!particles[i].update()){
        if(particles[i].type==='star'){
          particles[i].x=Math.random()*W;particles[i].y=Math.random()*H;
        }else{
          particles.splice(i,1);
        }
      }else{
        particles[i].draw(ctx);
      }
    }

    displayAnim=requestAnimationFrame(animate);
  }

  // Text animation sequence
  function animateTextIn(){
    const els=['dCake','dGreeting','dName','dDate','dBlessing','dSender'];
    els.forEach((id,i)=>{
      const el=$(id);
      el.style.animation=`slideInUp 0.6s ${i*0.3}s ease forwards`;
    });
    // Show replay button after text
    setTimeout(()=>{
      $('displayReplay').classList.add('show');
    },els.length*300+600);
  }

  animate();
}

// Replay
$('displayReplay').addEventListener('click',()=>{
  if(displayAnim)cancelAnimationFrame(displayAnim);
  $('displayReplay').classList.remove('show');
  ['dCake','dGreeting','dName','dDate','dBlessing','dSender'].forEach(id=>{
    $(id).style.animation='none';$(id).style.opacity='0';
  });
  // Re-start
  setTimeout(startDisplayMode,50);
});

// Music (simple Web Audio birthday tune)
$('displayMusic').addEventListener('click',function(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(musicPlaying){audioCtx.close();audioCtx=null;musicPlaying=false;this.classList.remove('playing');return}
  musicPlaying=true;this.classList.add('playing');
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  // Happy Birthday melody (simplified)
  const notes=[262,262,294,262,349,330, 262,262,294,262,392,349, 262,262,523,440,349,330,294, 466,466,440,349,392,349];
  const durations=[0.3,0.15,0.45,0.45,0.45,0.9, 0.3,0.15,0.45,0.45,0.45,0.9, 0.3,0.15,0.45,0.45,0.45,0.45,0.9, 0.3,0.15,0.45,0.45,0.45,0.9];
  let time=audioCtx.currentTime+0.1;
  notes.forEach((freq,i)=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.type='sine';osc.frequency.value=freq;
    gain.gain.setValueAtTime(0.15,time);
    gain.gain.exponentialRampToValueAtTime(0.01,time+durations[i]*0.9);
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.start(time);osc.stop(time+durations[i]);
    time+=durations[i];
  });
  setTimeout(()=>{musicPlaying=false;$('displayMusic').classList.remove('playing')},time*1000);
});


/* ===== INIT ===== */
if(isDisplayMode){
  // Display mode: show animated greeting card
  startDisplayMode();
}else{
  // Edit mode: show form
  initThemes();
  selectTheme(0);
}

})();
</script>
