<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Everyday · 生日快乐 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff6b9d;--primary-light:#ffb3cc;--primary-dark:#e8527f;
  --bg:#fff5f8;--card-bg:rgba(255,255,255,0.92);
  --text:#2d2d2d;--text-secondary:#888;
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,0.08);
  --theme-color:#ff6b9d;
}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}

.bg-decor{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-decor .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat 12s ease-in-out infinite}
.bg-decor .orb:nth-child(1){width:300px;height:300px;background:var(--theme-color);top:-80px;left:-60px}
.bg-decor .orb:nth-child(2){width:250px;height:250px;background:var(--theme-color);bottom:-50px;right:-40px;animation-delay:-4s;opacity:.25}
.bg-decor .orb:nth-child(3){width:200px;height:200px;background:var(--theme-color);top:40%;left:60%;animation-delay:-8s;opacity:.2}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

.app{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

.header{text-align:center;margin-bottom:24px;width:100%;max-width:480px}
.header h1{font-family:'ZCOOL KuaiLe',cursive;font-size:28px;color:var(--theme-color);margin-bottom:4px;transition:color .3s}
.header p{font-size:13px;color:var(--text-secondary)}

.card{width:100%;max-width:480px;background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.6);padding:28px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--theme-color);transition:background .3s}

.form-title{font-family:'ZCOOL KuaiLe',cursive;font-size:22px;text-align:center;margin-bottom:20px;color:var(--theme-color)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.form-group label .req{color:#ff4757;margin-left:2px}
.form-input{width:100%;height:44px;border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;transition:all .25s}
.form-input:focus{border-color:var(--theme-color);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,0.1)}
.form-input::placeholder{color:#bbb}
.birthday-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.birthday-trigger .arrow{font-size:12px;color:#999}

.theme-colors{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.theme-color-item{text-align:center}
.theme-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .25s;position:relative}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--text);transform:scale(1.15)}
.theme-dot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.theme-label{font-size:10px;color:#999;margin-top:4px}

.blessing-area{position:relative}
.blessing-textarea{width:100%;min-height:80px;border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;resize:vertical;transition:all .25s;line-height:1.6}
.blessing-textarea:focus{border-color:var(--theme-color);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,0.1)}
.blessing-btns{display:flex;gap:8px;margin-top:6px}
.blessing-btns button{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:var(--text-secondary);cursor:pointer;transition:all .2s;font-family:inherit}
.blessing-btns button:hover{border-color:var(--theme-color);color:var(--theme-color)}

.submit-btn{width:100%;height:50px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--theme-color),var(--theme-color));color:#fff;font-size:17px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;letter-spacing:2px;transition:all .3s;box-shadow:0 4px 16px rgba(255,107,157,0.3);position:relative;overflow:hidden}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,107,157,0.4)}
.submit-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(255,107,157,0.3)}
.submit-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.2) 50%,transparent 70%);transform:translateX(-100%);transition:none}
.submit-btn:hover::after{transform:translateX(100%);transition:transform .6s}

.result-section{margin-top:24px;display:none;text-align:center}
.result-section.show{display:block;animation:fadeUp .5s ease}
.result-tip{font-size:13px;color:var(--theme-color);margin-bottom:16px;line-height:1.6}
.result-card{width:100%;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:relative;background:#fff}
.result-card canvas{display:block;width:100%;height:auto}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.result-actions button{width:100%;height:46px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-download{background:var(--theme-color);color:#fff;box-shadow:0 4px 12px rgba(255,107,157,0.25)}
.btn-download:hover{opacity:.9;transform:translateY(-1px)}
.btn-copy{background:#fff;color:var(--theme-color);border:1.5px solid var(--theme-color)}
.btn-copy:hover{background:rgba(255,107,157,0.05)}
.qrcode-wrap{margin-top:20px;padding:20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);display:inline-block}
.qrcode-wrap p{font-size:13px;color:#999;margin-bottom:10px}
.qrcode-wrap canvas{display:block;margin:0 auto}
.qrcode-wrap .qr-tip{font-size:11px;color:#bbb;margin-top:8px}

/* Picker */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.picker-overlay.show{display:flex;animation:fadeIn .2s ease}
.picker-panel{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px 0 0;animation:slideUp .3s ease}
.picker-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px 16px;border-bottom:1px solid #f0f0f0}
.picker-header h3{font-size:16px;font-weight:500}
.picker-cancel,.picker-confirm{background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px}
.picker-cancel{color:#999}.picker-confirm{color:var(--theme-color);font-weight:600}
.picker-body{display:flex;height:220px;position:relative;padding:0 10px}
.picker-body::before{content:'';position:absolute;left:10px;right:10px;top:66px;height:44px;border-top:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;background:rgba(255,107,157,0.04);z-index:2;pointer-events:none;border-radius:8px}
.picker-column{flex:1;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
.picker-column::-webkit-scrollbar{display:none}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#999;scroll-snap-align:center;cursor:pointer;transition:all .15s;user-select:none}
.picker-sep{max-width:30px;flex:none;display:flex;align-items:center;justify-content:center}
.picker-sep span{color:#999;font-size:16px}
.picker-padding{height:88px}

/* History */
.history-btn{position:fixed;bottom:24px;left:20px;z-index:50;width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.1);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.history-btn:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.history-panel{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.history-panel.show{display:flex;animation:fadeIn .2s ease}
.history-content{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease}
.history-content h3{font-size:16px;font-weight:600;margin-bottom:4px}
.history-content .sub{font-size:12px;color:#999;margin-bottom:16px}
.history-item{display:flex;align-items:center;padding:12px;border-radius:var(--radius-sm);background:#fafafa;margin-bottom:8px;cursor:pointer;transition:all .2s}
.history-item:hover{background:#f0f0f0}
.history-item .info{flex:1;min-width:0}
.history-item .name{font-size:14px;font-weight:500}
.history-item .date{font-size:12px;color:#999}
.history-item .del-btn{width:32px;height:32px;border:none;background:none;color:#ccc;font-size:16px;cursor:pointer;border-radius:50%;transition:all .2s}
.history-item .del-btn:hover{background:#fee;color:#ff4757}
.history-empty{text-align:center;padding:30px;color:#ccc;font-size:14px}
.history-close{display:block;width:100%;height:44px;border:none;background:none;color:#999;font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

.footer{width:100%;max-width:480px;text-align:center;margin-top:32px;padding:20px 0;border-top:1px solid rgba(0,0,0,0.05)}
.footer .brand{font-family:'ZCOOL KuaiLe',cursive;font-size:18px;color:var(--theme-color);margin-bottom:8px}
.footer .desc{font-size:12px;color:#bbb;line-height:1.6;margin-bottom:16px}
.footer-copy{font-size:11px;color:#ccc}

/* ============================= */
/* ===== DISPLAY MODE ========== */
/* ============================= */
#displayMode{display:none;position:fixed;inset:0;z-index:1000;background:#000}
#displayMode.show{display:block}
#displayCanvas{position:absolute;inset:0;width:100%;height:100%}

/* Page 1: Opening splash */
.display-page1{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3;pointer-events:none;transition:opacity 1s ease}
.display-page1.fade-out{opacity:0;pointer-events:none}
.display-page1 .splash-emoji{font-size:clamp(50px,12vw,80px);opacity:0;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3))}
.display-page1 .splash-title{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(48px,14vw,96px);color:#fff;text-shadow:0 6px 30px rgba(0,0,0,0.4),0 0 60px rgba(255,255,255,0.15);opacity:0;letter-spacing:8px;margin-top:10px}
.display-page1 .splash-sub{font-size:clamp(16px,4vw,24px);color:rgba(255,255,255,0.7);opacity:0;margin-top:12px;letter-spacing:4px}
.display-page1 .splash-name{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(24px,6vw,40px);color:#fff;opacity:0;text-shadow:0 3px 15px rgba(0,0,0,0.3);margin-top:20px}
.display-page1 .splash-tap{position:absolute;bottom:50px;font-size:14px;color:rgba(255,255,255,0.5);opacity:0;pointer-events:auto;cursor:pointer;animation:tapPulse 1.5s ease-in-out infinite}
@keyframes tapPulse{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.7;transform:translateY(-5px)}}

/* Page 2: Blessing content */
.display-page2{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;z-index:2;pointer-events:none;opacity:0;transition:opacity 1s ease}
.display-page2.show{opacity:1}
.display-page2 .d-cake{font-size:clamp(50px,12vw,80px);opacity:0;margin-bottom:10px}
.display-page2 .d-greeting{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(28px,8vw,48px);color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.3);opacity:0;margin-bottom:8px}
.display-page2 .d-name{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(24px,6vw,40px);color:#fff;text-shadow:0 3px 15px rgba(0,0,0,0.3);opacity:0;margin-bottom:6px}
.display-page2 .d-date{font-size:clamp(15px,3.5vw,22px);color:rgba(255,255,255,0.8);opacity:0;margin-bottom:30px}
.display-page2 .d-blessing{font-size:clamp(18px,4.5vw,26px);color:rgba(255,255,255,0.95);line-height:1.8;max-width:500px;opacity:0;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
.display-page2 .d-sender{font-size:clamp(13px,3vw,17px);color:rgba(255,255,255,0.6);margin-top:30px;opacity:0}
.display-page2 .d-divider{width:60px;height:2px;background:rgba(255,255,255,0.3);margin:20px auto;opacity:0;border-radius:1px}

.display-replay{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:auto;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:10px 28px;border-radius:24px;font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;opacity:0;display:none}

/* Page 3: Blessing overflow */
.display-page3{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;z-index:2;pointer-events:none;opacity:0;transition:opacity 1s ease}
.display-page3.show{opacity:1}
.display-page3 .p3-blessing{font-size:clamp(18px,4.5vw,26px);color:rgba(255,255,255,0.95);line-height:1.9;max-width:500px;opacity:0;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
.display-page3 .p3-sender{font-size:clamp(15px,3.5vw,20px);color:rgba(255,255,255,0.7);margin-top:40px;opacity:0}
.display-page3 .p3-heart{font-size:clamp(40px,10vw,60px);opacity:0;margin-bottom:20px}
.display-page3 .p3-tap{position:absolute;bottom:50px;font-size:14px;color:rgba(255,255,255,0.5);opacity:0;pointer-events:auto;cursor:pointer}
.display-replay.show{opacity:1;display:block}
.display-replay:hover{background:rgba(255,255,255,0.25)}
.display-music{position:absolute;top:20px;right:20px;z-index:10;pointer-events:auto;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.display-music:hover{background:rgba(255,255,255,0.25)}
.display-music.playing{animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.3)}70%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes textGlow{0%,100%{text-shadow:0 6px 30px rgba(0,0,0,0.4),0 0 60px rgba(255,255,255,0.15)}50%{text-shadow:0 6px 30px rgba(0,0,0,0.4),0 0 80px rgba(255,255,255,0.3)}}
@keyframes floatUp{0%{opacity:0;transform:translateY(30px) scale(0.9)}100%{opacity:1;transform:translateY(0) scale(1)}}

@media(min-width:600px){.app{padding:40px 20px 60px}.card{padding:36px 32px}}
@media(max-width:360px){.header h1{font-size:22px}.card{padding:20px 16px}.theme-dot{width:32px;height:32px}}
</style>
</head>
<body>

<!-- ===== EDIT MODE ===== -->
<div class="bg-decor"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app" id="editMode">
  <header class="header">
    <h1>🎂 生日快乐</h1>
    <p>Happy Everyday · 用心传递每一份温暖</p>
  </header>

  <div class="card">
    <div class="form-title">🎈 生日贺卡生成器</div>
    <div class="form-group">
      <label>寿星昵称 <span class="req">*</span></label>
      <input type="text" class="form-input" id="nameInput" placeholder="输入Ta的名字" maxlength="20">
    </div>
    <div class="form-group">
      <label>生日 <span class="req">*</span></label>
      <div class="form-input birthday-trigger" id="birthdayTrigger" tabindex="0">
        <span id="birthdayDisplay" style="color:#bbb">选择日期</span>
        <span class="arrow">▼</span>
      </div>
    </div>
    <div class="form-group">
      <label>发送人昵称 <span class="req">*</span></label>
      <input type="text" class="form-input" id="senderInput" placeholder="你的名字" maxlength="20">
    </div>
    <div class="form-group">
      <label>主题色</label>
      <div class="theme-colors" id="themeColors"></div>
    </div>
    <div class="form-group">
      <label>祝福语</label>
      <div class="blessing-area">
        <textarea class="blessing-textarea" id="blessingInput" placeholder="写下你的祝福..." maxlength="200"></textarea>
        <div class="blessing-btns">
          <button id="rotateBlessing">🔄 换一条</button>
          <button id="clearBlessing">✕ 清空</button>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Ta的邮箱（选填）</label>
      <input type="email" class="form-input" id="emailInput" placeholder="example@mail.com">
    </div>
    <button class="submit-btn" id="generateBtn">✨ 立即生成 ✨</button>

    <div class="result-section" id="resultSection">
      <p class="result-tip">🎉 请保存贺卡图片和链接，用于分享和预览！</p>
      <div class="result-card" id="resultCard">
        <canvas id="cardCanvas" width="600" height="1050"></canvas>
      </div>
      <div class="result-actions">
        <button class="btn-download" id="downloadBtn">📥 下载贺卡图片（含二维码）</button>
        <button class="btn-copy" id="copyBtn">🔗 复制链接</button>
      </div>
      <div class="qrcode-wrap" id="qrcodeWrap">
        <p>📱 扫码查看生日祝福</p>
        <div id="qrcodeEl"></div>
        <div class="qr-tip">长按二维码可保存图片</div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="brand">Happy Everyday</div>
    <div class="desc">用心传递每一份温暖<br>让每一个特殊时刻都充满惊喜与感动</div>
    <div class="footer-copy">Copyright © 2025 Happy Everyday</div>
  </footer>
</div>

<!-- ===== DISPLAY MODE ===== -->
<div id="displayMode">
  <canvas id="displayCanvas"></canvas>
  <!-- Page 1: Opening splash -->
  <div class="display-page1" id="page1">
    <div class="splash-emoji" id="sEmoji">🎂</div>
    <div class="splash-title" id="sTitle">生日快乐</div>
    <div class="splash-sub" id="sSub">HAPPY BIRTHDAY</div>
    <div class="splash-name" id="sName"></div>
    <div class="splash-tap" id="sTap">✨ 点击屏幕继续 ✨</div>
  </div>
  <!-- Page 2: Blessing content -->
  <div class="display-page2" id="page2">
    <div class="d-cake" id="dCake">🎂</div>
    <div class="d-greeting" id="dGreeting">生日快乐！</div>
    <div class="d-name" id="dName"></div>
    <div class="d-date" id="dDate"></div>
    <div class="d-divider" id="dDivider"></div>
    <div class="d-blessing" id="dBlessing"></div>
    <div class="d-sender" id="dSender"></div>
    <div class="d-tap-next" id="dTapNext" style="position:absolute;bottom:50px;font-size:14px;color:rgba(255,255,255,0.5);opacity:0;pointer-events:auto;cursor:pointer">✨ 点击继续 ✨</div>
  </div>
  <!-- Page 3: Blessing overflow (only shown if text is long) -->
  <div class="display-page3" id="page3">
    <div class="p3-heart" id="p3Heart">💖</div>
    <div class="p3-blessing" id="p3Blessing"></div>
    <div class="p3-sender" id="p3Sender"></div>
  </div>

<script>
(function(){
'use strict';

const THEMES=[
  {name:'樱桃粉',color:'#ff6b9d',light:'#ffb3cc',dark:'#e8527f',gradient:'linear-gradient(135deg,#ff6b9d,#ff8fab)',cg:['#ffb3cc','#ff6b9d','#e8527f']},
  {name:'天空蓝',color:'#4facfe',light:'#a0d2ff',dark:'#2d8cf0',gradient:'linear-gradient(135deg,#4facfe,#00f2fe)',cg:['#a0d2ff','#4facfe','#2d8cf0']},
  {name:'中国红',color:'#e74c3c',light:'#ff8a80',dark:'#c0392b',gradient:'linear-gradient(135deg,#e74c3c,#ff6b6b)',cg:['#ff8a80','#e74c3c','#c0392b']},
  {name:'提夫尼蓝',color:'#0abde3',light:'#7ee8ff',dark:'#0097b2',gradient:'linear-gradient(135deg,#0abde3,#48dbfb)',cg:['#7ee8ff','#0abde3','#0097b2']},
  {name:'牛油果绿',color:'#2ed573',light:'#7bed9f',dark:'#20bf6b',gradient:'linear-gradient(135deg,#2ed573,#7bed9f)',cg:['#7bed9f','#2ed573','#20bf6b']},
  {name:'爱马仕橙',color:'#ff9f43',light:'#ffcb80',dark:'#ee7600',gradient:'linear-gradient(135deg,#ff9f43,#f6b93b)',cg:['#ffcb80','#ff9f43','#ee7600']},
  {name:'玫瑰紫',color:'#a55eea',light:'#cd9cff',dark:'#8854d0',gradient:'linear-gradient(135deg,#a55eea,#cd84f1)',cg:['#cd9cff','#a55eea','#8854d0']},
  {name:'柠檬黄',color:'#fed330',light:'#fff59d',dark:'#f7b731',gradient:'linear-gradient(135deg,#fed330,#fff200)',cg:['#fff59d','#fed330','#f7b731']}
];

let currentTheme=0,selectedMonth=1,selectedDay=1,pickerMonth=1,pickerDay=1;

const BLESSINGS=[
  '生日快乐！愿你每一天都充满阳光和笑容！',
  '又长大一岁啦！祝你永远18岁，开心每一天！',
  '在这个特别的日子里，祝你心想事成，万事如意！',
  '愿你的生日充满无穷的快乐，愿你今天的回忆温馨！',
  '生日快乐！愿所有的幸福都围绕着你！',
  '祝你生日快乐，天天开心，事事顺利！',
  '又是一年花开时，愿你笑容比花儿更灿烂！',
  '愿你此生尽兴，赤诚善良，生日快乐！',
  '祝最可爱的你，生日快乐，永远被爱包围！',
  '愿你的每一个愿望都能实现，生日快乐！',
  '愿你眼中总有光芒，活成你想要的模样！',
  '时间不停留，但我的祝福会一直陪着你！'
];
let blessingIndex=0;

const $=id=>document.getElementById(id);
const nameInput=$('nameInput'),senderInput=$('senderInput'),blessingInput=$('blessingInput');
const birthdayTrigger=$('birthdayTrigger'),birthdayDisplay=$('birthdayDisplay');
const pickerOverlay=$('pickerOverlay'),monthColumn=$('monthColumn'),dayColumn=$('dayColumn');
const generateBtn=$('generateBtn'),resultSection=$('resultSection');
const cardCanvas=$('cardCanvas'),downloadBtn=$('downloadBtn'),copyBtn=$('copyBtn');
const toastEl=$('toast'),historyBtn=$('historyBtn'),historyPanel=$('historyPanel'),historyList=$('historyList'),historyClose=$('historyClose');
const themeColorsEl=$('themeColors');

const urlParams=new URLSearchParams(location.search);
const isDisplayMode=urlParams.has('name')&&urlParams.has('sender');

function initThemes(){
  THEMES.forEach((t,i)=>{
    const w=document.createElement('div');w.className='theme-color-item';
    const d=document.createElement('div');d.className='theme-dot'+(i===0?' active':'');
    d.style.background=t.gradient;d.title=t.name;
    d.addEventListener('click',()=>selectTheme(i));
    const l=document.createElement('div');l.className='theme-label';l.textContent=t.name;
    w.appendChild(d);w.appendChild(l);themeColorsEl.appendChild(w);
  });
}
function selectTheme(i){
  currentTheme=i;const t=THEMES[i];
  document.documentElement.style.setProperty('--theme-color',t.color);
  document.querySelectorAll('.theme-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  const btn=document.querySelector('.submit-btn');
  if(btn){btn.style.background=t.gradient;btn.style.boxShadow=`0 4px 16px ${t.color}44`}
}

function getDaysInMonth(m){return[31,29,31,30,31,30,31,31,30,31,30,31][m-1]}
function buildPicker(){
  monthColumn.innerHTML='';dayColumn.innerHTML='';
  const mk=()=>{const d=document.createElement('div');d.className='picker-padding';return d};
  monthColumn.appendChild(mk());
  for(let m=1;m<=12;m++){const d=document.createElement('div');d.className='picker-item';d.textContent=String(m).padStart(2,'0');d.dataset.val=m;monthColumn.appendChild(d)}
  monthColumn.appendChild(mk());
  dayColumn.appendChild(mk());
  const dim=getDaysInMonth(pickerMonth);
  for(let d=1;d<=dim;d++){const e=document.createElement('div');e.className='picker-item';e.textContent=String(d).padStart(2,'0');e.dataset.val=d;dayColumn.appendChild(e)}
  dayColumn.appendChild(mk());
}
function scrollPicker(col,val){
  col.querySelectorAll('.picker-item').forEach(it=>{it.style.color='';it.style.fontWeight=''});
  const items=[...col.querySelectorAll('.picker-item')];
  const t=items.find(it=>it.dataset.val==val);
  if(t){col.scrollTop=t.offsetTop-44*1.5+22;t.style.color='var(--theme-color)';t.style.fontWeight='600'}
}
function readPickerCol(col){
  const items=[...col.querySelectorAll('.picker-item')];const center=col.scrollTop+col.clientHeight/2;
  let best=items[0],min=Infinity;items.forEach(it=>{const d=Math.abs(it.offsetTop+22-center);if(d<min){min=d;best=it}});
  return parseInt(best.dataset.val)||1;
}
let mT,dT;
function onPickerScroll(col,type){
  clearTimeout(type==='month'?mT:dT);
  const tm=setTimeout(()=>{
    const val=readPickerCol(col);
    if(type==='month'){
      pickerMonth=val;const oldDay=pickerDay;dayColumn.innerHTML='';
      const mk=()=>{const d=document.createElement('div');d.className='picker-padding';return d};
      dayColumn.appendChild(mk());const dim=getDaysInMonth(val);
      for(let d=1;d<=dim;d++){const e=document.createElement('div');e.className='picker-item';e.textContent=String(d).padStart(2,'0');e.dataset.val=d;dayColumn.appendChild(e)}
      dayColumn.appendChild(mk());pickerDay=Math.min(oldDay,dim);scrollPicker(dayColumn,pickerDay);
    }else{pickerDay=val}highlightPicker();
  },80);
  if(type==='month')mT=tm;else dT=tm;
}
function highlightPicker(){
  monthColumn.querySelectorAll('.picker-item').forEach(it=>{const a=parseInt(it.dataset.val)===pickerMonth;it.style.color=a?'var(--theme-color)':'';it.style.fontWeight=a?'600':''});
  dayColumn.querySelectorAll('.picker-item').forEach(it=>{const a=parseInt(it.dataset.val)===pickerDay;it.style.color=a?'var(--theme-color)':'';it.style.fontWeight=a?'600':''});
}
function openPicker(){
  pickerMonth=selectedMonth;pickerDay=selectedDay;buildPicker();pickerOverlay.classList.add('show');
  setTimeout(()=>{scrollPicker(monthColumn,pickerMonth);scrollPicker(dayColumn,pickerDay);monthColumn.onscroll=()=>onPickerScroll(monthColumn,'month');dayColumn.onscroll=()=>onPickerScroll(dayColumn,'day')},50);
}
function closePicker(){pickerOverlay.classList.remove('show');monthColumn.onscroll=null;dayColumn.onscroll=null}

birthdayTrigger.addEventListener('click',openPicker);
$('pickerCancel').addEventListener('click',closePicker);
$('pickerConfirm').addEventListener('click',()=>{
  selectedMonth=pickerMonth;selectedDay=pickerDay;
  birthdayDisplay.textContent=`${String(selectedMonth).padStart(2,'0')}月${String(selectedDay).padStart(2,'0')}日`;
  birthdayDisplay.style.color='var(--text)';closePicker();
});
pickerOverlay.addEventListener('click',e=>{if(e.target===pickerOverlay)closePicker()});

$('rotateBlessing').addEventListener('click',()=>{
  blessingInput.value=BLESSINGS[blessingIndex%BLESSINGS.length];blessingIndex++;
  blessingInput.style.animation='none';void blessingInput.offsetWidth;blessingInput.style.animation='bounce .3s ease';
});
$('clearBlessing').addEventListener('click',()=>{blessingInput.value=''});

function showToast(msg,dur=1500){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),dur)}

function buildShareURL(){
  const n=encodeURIComponent(nameInput.value.trim()),s=encodeURIComponent(senderInput.value.trim()),b=encodeURIComponent(blessingInput.value.trim());
  return `${location.origin}${location.pathname}?name=${n}&sender=${s}&month=${selectedMonth}&day=${selectedDay}&theme=${currentTheme}&blessing=${b}`;
}

function generateCard(){
  const name=nameInput.value.trim(),sender=senderInput.value.trim();
  if(!name){showToast('请输入寿星昵称');nameInput.focus();return}
  if(!sender){showToast('请输入发送人昵称');senderInput.focus();return}
  const t=THEMES[currentTheme],blessing=blessingInput.value.trim()||BLESSINGS[blessingIndex%BLESSINGS.length];
  const canvas=cardCanvas,ctx=canvas.getContext('2d'),W=600,H=1050;
  canvas.width=W;canvas.height=H;

  const bg=ctx.createLinearGradient(0,0,W*0.5,H);
  bg.addColorStop(0,t.cg[0]+'dd');bg.addColorStop(0.5,t.cg[1]+'cc');bg.addColorStop(1,t.cg[2]+'ee');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(let i=0;i<25;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*50+10,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.12+0.04})`;ctx.fill()}
  for(let i=0;i<35;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.3})`;drawStar(ctx,Math.random()*W,Math.random()*H*0.35,Math.random()*3+1)}
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(40,70);ctx.lineTo(W-40,70);ctx.stroke();
  ctx.beginPath();ctx.moveTo(40,H-70);ctx.lineTo(W-40,H-70);ctx.stroke();
  drawCake(ctx,W/2,480,t);

  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='56px "ZCOOL KuaiLe",cursive';ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=12;ctx.shadowOffsetY=4;
  ctx.fillText('🎂 生日快乐！',W/2,140);ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.font='44px "ZCOOL KuaiLe",cursive';ctx.fillStyle='#fff';ctx.fillText(`致：${name}`,W/2,220);
  ctx.font='24px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fillText(`${selectedMonth}月${selectedDay}日`,W/2,270);
  ctx.font='20px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.95)';wrapText(ctx,blessing,W/2,700,W-80,32);
  ctx.font='18px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fillText(`—— 来自 ${sender} 的祝福`,W/2,830);

  const shareURL=buildShareURL();drawQRCodeOnCanvas(ctx,shareURL,W,H,t);
  ctx.font='13px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('Happy Everyday · 扫码打开给Ta惊喜 🎉',W/2,H-40);

  resultSection.classList.add('show');resultSection.scrollIntoView({behavior:'smooth',block:'start'});
  generateQRCode(shareURL);saveHistory(name,sender,selectedMonth,selectedDay,blessing,currentTheme);
}

function drawQRCodeOnCanvas(ctx,url,W,H,t){
  try{const qr=qrcode(0,'L');qr.addData(url);qr.make();const sz=qr.getModuleCount(),cs=Math.floor(120/sz),qs=sz*cs,cx=W/2,cy=H-180;
  ctx.fillStyle='rgba(255,255,255,0.9)';roundRect(ctx,cx-qs/2-16,cy-qs/2-16,qs+32,qs+32,12);ctx.fill();
  for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)if(qr.isDark(r,c)){ctx.fillStyle=t.cg[2];ctx.fillRect(cx-qs/2+c*cs,cy-qs/2+r*cs,cs,cs)}
  }catch(e){}
}
function generateQRCode(url){
  const el=$('qrcodeEl');el.innerHTML='';
  try{const qr=qrcode(0,'M');qr.addData(url);qr.make();const sz=qr.getModuleCount(),cl=Math.max(4,Math.floor(200/sz));
  const c=document.createElement('canvas');c.width=sz*cl;c.height=sz*cl;const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  for(let r=0;r<sz;r++)for(let co=0;co<sz;co++)if(qr.isDark(r,co)){ctx.fillStyle=THEMES[currentTheme].cg[1];ctx.fillRect(co*cl,r*cl,cl,cl)}
  // Convert canvas to img so mobile long-press can save
  const img=document.createElement('img');
  img.src=c.toDataURL('image/png');
  img.style.width='200px';img.style.height='200px';img.style.borderRadius='8px';
  img.alt='生日祝福二维码';
  el.appendChild(img);
  }catch(e){el.innerHTML='<p style="color:#999;font-size:12px">二维码生成失败</p>'}
}
function drawStar(ctx,x,y,r){ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI*2*i/5-Math.PI/2,ax=x+Math.cos(a)*r,ay=y+Math.sin(a)*r,b=a+Math.PI/5,bx=x+Math.cos(b)*r*0.4,by=y+Math.sin(b)*r*0.4;if(i===0)ctx.moveTo(ax,ay);else ctx.lineTo(ax,ay);ctx.lineTo(bx,by)}ctx.closePath();ctx.fill()}
function drawCake(ctx,cx,cy,t){
  ctx.beginPath();ctx.ellipse(cx,cy+80,90,18,0,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.45)';ctx.fill();
  const g1=ctx.createLinearGradient(cx-70,cy,cx+70,cy);g1.addColorStop(0,t.cg[2]);g1.addColorStop(1,t.cg[1]);ctx.fillStyle=g1;roundRect(ctx,cx-70,cy,140,50,12);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';for(let i=-60;i<60;i+=18){ctx.beginPath();ctx.arc(cx+i,cy+50,10,0,Math.PI);ctx.fill()}
  const g2=ctx.createLinearGradient(cx-55,cy-45,cx+55,cy-45);g2.addColorStop(0,t.cg[1]);g2.addColorStop(1,t.cg[0]);ctx.fillStyle=g2;roundRect(ctx,cx-55,cy-45,110,45,10);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';for(let i=-45;i<45;i+=15){ctx.beginPath();ctx.arc(cx+i,cy,8,0,Math.PI);ctx.fill()}
  [cx-30,cx,cx+30].forEach((x,i)=>{ctx.fillStyle=i%2===0?'#fff':'#ffe8f0';roundRect(ctx,x-3,cy-85,6,40,2);ctx.fill();
  ctx.beginPath();ctx.moveTo(x,cy-95);ctx.quadraticCurveTo(x+8,cy-105,x,cy-115);ctx.quadraticCurveTo(x-8,cy-105,x,cy-95);ctx.fillStyle=i===1?'#ffeb3b':'#ff9800';ctx.fill();
  const gl=ctx.createRadialGradient(x,cy-105,0,x,cy-105,15);gl.addColorStop(0,'rgba(255,200,50,0.4)');gl.addColorStop(1,'rgba(255,200,50,0)');ctx.fillStyle=gl;ctx.fillRect(x-15,cy-120,30,30)});
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function wrapText(ctx,text,x,y,maxW,lh){let line='',ly=y;for(const ch of text){const t=line+ch;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,ly);line=ch;ly+=lh}else line=t}if(line)ctx.fillText(line,x,ly)}

generateBtn.addEventListener('click',generateCard);
downloadBtn.addEventListener('click',()=>{const l=document.createElement('a');l.download=`生日贺卡_${nameInput.value.trim()||'好友'}.png`;l.href=cardCanvas.toDataURL('image/png');l.click();showToast('📥 图片已开始下载')});
copyBtn.addEventListener('click',()=>{const url=buildShareURL();navigator.clipboard.writeText(url).then(()=>showToast('🔗 链接已复制到剪贴板')).catch(()=>{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('🔗 链接已复制到剪贴板')})});

function getHistory(){try{return JSON.parse(localStorage.getItem('bd_history')||'[]')}catch{return[]}}
function saveHistory(name,sender,month,day,blessing,theme){const l=getHistory();l.unshift({name,sender,month,day,blessing,theme,time:Date.now()});if(l.length>20)l.length=20;localStorage.setItem('bd_history',JSON.stringify(l))}
function renderHistory(){
  const l=getHistory();if(!l.length){historyList.innerHTML='<div class="history-empty">暂无记录</div>';return}
  historyList.innerHTML=l.map((it,i)=>`<div class="history-item" data-idx="${i}"><div class="info"><div class="name">🎂 ${it.name}</div><div class="date">${it.month}月${it.day}日 · 来自 ${it.sender}</div></div><button class="del-btn" data-delidx="${i}">✕</button></div>`).join('');
  historyList.querySelectorAll('.history-item').forEach(el=>{el.addEventListener('click',e=>{
    if(e.target.classList.contains('del-btn')){e.stopPropagation();const i=parseInt(e.target.dataset.delidx);const l=getHistory();l.splice(i,1);localStorage.setItem('bd_history',JSON.stringify(l));renderHistory();return}
    const it=getHistory()[parseInt(el.dataset.idx)];if(!it)return;nameInput.value=it.name;senderInput.value=it.sender;selectedMonth=it.month;selectedDay=it.day;
    birthdayDisplay.textContent=`${String(it.month).padStart(2,'0')}月${String(it.day).padStart(2,'0')}日`;birthdayDisplay.style.color='var(--text)';
    blessingInput.value=it.blessing||'';if(it.theme!==undefined)selectTheme(it.theme);historyPanel.classList.remove('show');window.scrollTo({top:0,behavior:'smooth'});
  })});
}
historyBtn.addEventListener('click',()=>{renderHistory();historyPanel.classList.add('show')});
historyClose.addEventListener('click',()=>historyPanel.classList.remove('show'));
historyPanel.addEventListener('click',e=>{if(e.target===historyPanel)historyPanel.classList.remove('show')});

let displayAnim=null,audioCtx=null,musicPlaying=false;
let displayData={};

function startDisplayMode(){
  displayData={
    name:urlParams.get('name')||'',sender:urlParams.get('sender')||'',
    month:parseInt(urlParams.get('month'))||1,day:parseInt(urlParams.get('day'))||1,
    themeIdx:parseInt(urlParams.get('theme'))||0,blessing:urlParams.get('blessing')||'生日快乐！'
  };
  const t=THEMES[displayData.themeIdx]||THEMES[0];selectTheme(displayData.themeIdx);

  $('editMode').style.display='none';
  document.querySelector('.history-btn').style.display='none';
  document.querySelector('.bg-decor').style.display='none';
  $('displayMode').classList.add('show');

  // Split blessing into pages (about 30 chars per page at the larger font)
  const blessingText=displayData.blessing;
  const MAX_CHARS_PER_PAGE=30; // ~2 lines of text on screen
  let blessingPage1='',blessingPage2='';
  if(blessingText.length>MAX_CHARS_PER_PAGE){
    // Find a good break point
    let breakIdx=MAX_CHARS_PER_PAGE;
    for(let i=MAX_CHARS_PER_PAGE;i<Math.min(MAX_CHARS_PER_PAGE+10,blessingText.length);i++){
      if(blessingText[i]==='，'||blessingText[i]==='。'||blessingText[i]==='！'||blessingText[i]==='？'||blessingText[i]==='、'||blessingText[i]===' '){breakIdx=i+1;break}
    }
    blessingPage1=blessingText.substring(0,breakIdx);
    blessingPage2=blessingText.substring(breakIdx);
  }else{
    blessingPage1=blessingText;blessingPage2='';
  }
  const hasPage3=blessingPage2.length>0;

  // Set page1 text
  $('sName').textContent=`致：${displayData.name}`;
  // Set page2 text
  $('dName').textContent=`致：${displayData.name}`;
  $('dDate').textContent=`${displayData.month}月${displayData.day}日`;
  $('dBlessing').textContent=blessingPage1;
  $('dSender').textContent=hasPage3?'':`—— 来自 ${displayData.sender} 的祝福`;
  // Set page3 text
  $('p3Blessing').textContent=blessingPage2;
  $('p3Sender').textContent=`—— 来自 ${displayData.sender} 的祝福`;

  // Reset pages
  $('page1').style.display='';$('page1').classList.remove('fade-out');
  $('page2').classList.remove('show');
  $('page3').classList.remove('show');
  $('displayReplay').classList.remove('show');$('displayReplay').style.display='none';

  // Reset all animated elements
  ['sEmoji','sTitle','sSub','sName','sTap'].forEach(id=>{$(id).style.animation='none';$(id).style.opacity='0'});
  ['dCake','dGreeting','dName','dDate','dDivider','dBlessing','dSender','dTapNext'].forEach(id=>{$(id).style.animation='none';$(id).style.opacity='0'});
  ['p3Heart','p3Blessing','p3Sender'].forEach(id=>{$(id).style.animation='none';$(id).style.opacity='0'});

  // Start canvas
  const canvas=$('displayCanvas'),ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let W,H;
  function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
  resize();window.addEventListener('resize',resize);

  const particles=[];const MAX_P=135;
  class P{
    constructor(type){this.type=type;this.init()}
    init(){
      this.life=1;this.rotation=Math.random()*360;this.rotSpeed=(Math.random()-0.5)*4;
      this.opacity=Math.random()*0.5+0.5;
      if(this.type==='star'){this.x=Math.random()*W;this.y=Math.random()*H;this.size=Math.random()*3+1;this.vx=0;this.vy=0;this.twinkle=Math.random()*Math.PI*2;this.twinkleSpd=Math.random()*0.05+0.02}
      else if(this.type==='confetti'){this.x=Math.random()*W;this.y=-20-Math.random()*H*0.3;this.vx=(Math.random()-0.5)*1.5;this.vy=Math.random()*1.5+0.5;this.size=Math.random()*8+4;this.color=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9ff3','#fff'][Math.floor(Math.random()*6)];this.shape=Math.random()>0.5?'rect':'circle'}
      else if(this.type==='heart'){this.x=Math.random()*W;this.y=-20;this.vx=(Math.random()-0.5)*0.5;this.vy=Math.random()*0.8+0.3;this.size=Math.random()*12+6;this.color=t.cg[1]}
      else if(this.type==='balloon'){this.color=[t.cg[0],t.cg[1],t.cg[2],'#ff6b6b','#ffd93d','#6bcb77'][Math.floor(Math.random()*6)];this.vy=-(Math.random()*0.6+0.3);this.vx=(Math.random()-0.5)*0.3;this.size=Math.random()*20+15;this.x=Math.random()*W;this.y=H+20+Math.random()*100}
      else if(this.type==='firework'){this.color=t.cg[Math.floor(Math.random()*3)];this.life=1;this.decay=Math.random()*0.02+0.01;this.size=Math.random()*3+1;this.gravity=0.03;this.vx=0;this.vy=0}
      else if(this.type==='spark'){this.life=1;this.decay=Math.random()*0.03+0.015;this.size=Math.random()*4+1;this.gravity=0.05;this.color='#fff'}
    }
    update(){
      this.x+=this.vx;this.y+=this.vy;this.rotation+=this.rotSpeed;
      if(this.type==='balloon'){this.x+=Math.sin(Date.now()*0.002+this.x)*0.2;return this.y>-40}
      if(this.type==='firework'||this.type==='spark'){this.vy+=this.gravity;this.life-=this.decay;return this.life>0}
      if(this.type==='star'){this.twinkle+=this.twinkleSpd;return true}
      return this.y<H+20&&this.x>-20&&this.x<W+20;
    }
    draw(ctx){
      ctx.save();ctx.globalAlpha=this.opacity*Math.max(0,this.life);
      ctx.translate(this.x,this.y);ctx.rotate(this.rotation*Math.PI/180);
      if(this.type==='confetti'){ctx.fillStyle=this.color;if(this.shape==='rect')ctx.fillRect(-this.size/2,-this.size/4,this.size,this.size/2);else{ctx.beginPath();ctx.arc(0,0,this.size/2,0,Math.PI*2);ctx.fill()}}
      else if(this.type==='heart')drawHeart(ctx,0,0,this.size,this.color);
      else if(this.type==='balloon')drawBalloon(ctx,0,0,this.size,this.color);
      else if(this.type==='firework'||this.type==='spark'){ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(0,0,this.size*Math.max(0.1,this.life),0,Math.PI*2);ctx.fill()}
      else if(this.type==='star'){ctx.globalAlpha=0.5+Math.sin(this.twinkle)*0.3;ctx.fillStyle='#fff';drawStar(ctx,0,0,this.size)}
      ctx.restore();
    }
  }

  function drawHeart(ctx,x,y,s,c){ctx.fillStyle=c;ctx.beginPath();const h=s/2;ctx.moveTo(x,y+h*0.3);ctx.bezierCurveTo(x,y-h*0.3,x-h,y-h*0.3,x-h,y+h*0.1);ctx.bezierCurveTo(x-h,y+h*0.6,x,y+h,x,y+h);ctx.bezierCurveTo(x,y+h,x+h,y+h*0.6,x+h,y+h*0.1);ctx.bezierCurveTo(x+h,y-h*0.3,x,y-h*0.3,x,y+h*0.3);ctx.fill()}
  function drawBalloon(ctx,x,y,s,c){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y-s*0.4,s*0.4,s*0.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(x-s*0.12,y-s*0.6,s*0.1,s*0.15,-0.3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y+s*0.1);ctx.quadraticCurveTo(x+3,y+s*0.3,x,y+s*0.5);ctx.stroke()}

  // Init stars
  for(let i=0;i<50;i++){const p=new P('star');particles.push(p)}

  let frame=0,fwTimer=0,currentPhase='splash';
  let rocketPhase=0,rocketX=0,rocketY=0;

  function spawnBurst(cx,cy,count){
    for(let i=0;i<count&&particles.length<MAX_P+count;i++){
      const p=new P('firework');p.x=cx;p.y=cy;
      const a=Math.random()*Math.PI*2,sp=Math.random()*3+1;
      p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;particles.push(p);
    }
  }
  function spawnRocket(){
    rocketPhase=1;rocketX=W*0.15+Math.random()*W*0.7;rocketY=H;
  }

  function animate(){
    frame++;ctx.clearRect(0,0,W,H);

    // BG
    const bg=ctx.createLinearGradient(0,0,W*0.3,H);
    bg.addColorStop(0,t.cg[2]+'ee');bg.addColorStop(0.5,t.cg[1]+'dd');bg.addColorStop(1,t.cg[0]+'cc');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // Phase: splash (page1)
    if(currentPhase==='splash'){
      if(frame===1){
        // Animate page1 elements
        setTimeout(()=>{$('sEmoji').style.animation='popIn 0.8s ease forwards'},200);
        setTimeout(()=>{$('sTitle').style.animation='popIn 0.8s 0.3s ease forwards'},300);
        setTimeout(()=>{$('sTitle').style.animation='popIn 0.8s 0.3s ease forwards, textGlow 3s 1.2s ease-in-out infinite'},1100);
        setTimeout(()=>{$('sSub').style.animation='floatUp 0.6s 0.6s ease forwards'},600);
        setTimeout(()=>{$('sName').style.animation='floatUp 0.6s 0.9s ease forwards'},900);
        setTimeout(()=>{$('sTap').style.animation='fadeIn 0.5s 1.8s ease forwards'},1800);
        // First big firework burst
        setTimeout(()=>spawnBurst(W/2,H*0.25,60),400);
        setTimeout(()=>spawnBurst(W*0.25,H*0.3,40),700);
        setTimeout(()=>spawnBurst(W*0.75,H*0.3,40),900);
      }
      // Continuous fireworks during splash
      if(frame>60&&frame%80===0)spawnBurst(W*0.2+Math.random()*W*0.6,H*0.15+Math.random()*H*0.25,35);
    }

    // Phase: blessing (page2)
    if(currentPhase==='blessing'){
      fwTimer++;
      if(fwTimer%50===0)spawnBurst(W*0.2+Math.random()*W*0.6,H*0.15+Math.random()*H*0.3,35);
      if(frame%4===0&&particles.length<MAX_P+55)particles.push(new P('confetti'));
      if(frame%9===0&&particles.length<MAX_P+55)particles.push(new P('heart'));
      if(frame%22===0&&particles.length<MAX_P+55)particles.push(new P('balloon'));
    }

    // Rocket animation
    if(rocketPhase===1){
      rocketY-=6;
      // Draw rocket trail
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(rocketX,rocketY,2,0,Math.PI*2);ctx.fill();
      if(rocketY<H*0.2+Math.random()*H*0.15){spawnBurst(rocketX,rocketY,45);rocketPhase=0}
    }

    // Particles
    for(let i=particles.length-1;i>=0;i--){
      if(!particles[i].update()){if(particles[i].type==='star'){particles[i].x=Math.random()*W;particles[i].y=Math.random()*H}else particles.splice(i,1)}
      else particles[i].draw(ctx);
    }

    displayAnim=requestAnimationFrame(animate);
  }

  // Click to go from splash to blessing
  function goToBlessing(){
    if(currentPhase!=='splash')return;
    currentPhase='blessing';fwTimer=0;
    $('page1').classList.add('fade-out');
    setTimeout(()=>{$('page1').style.display='none';$('page2').classList.add('show');
      // Animate page2 elements
      setTimeout(()=>{$('dCake').style.animation='popIn 0.6s ease forwards'},100);
      setTimeout(()=>{$('dGreeting').style.animation='slideInUp 0.6s ease forwards'},300);
      setTimeout(()=>{$('dName').style.animation='slideInUp 0.6s 0.15s ease forwards'},450);
      setTimeout(()=>{$('dDate').style.animation='slideInUp 0.6s 0.3s ease forwards'},600);
      setTimeout(()=>{$('dDivider').style.animation='fadeIn 0.5s 0.5s ease forwards'},700);
      setTimeout(()=>{$('dBlessing').style.animation='slideInUp 0.6s 0.6s ease forwards'},800);
      if(!hasPage3){
        setTimeout(()=>{$('dSender').style.animation='slideInUp 0.6s 0.9s ease forwards'},1000);
        setTimeout(()=>{$('displayReplay').style.display='block';setTimeout(()=>$('displayReplay').classList.add('show'),100)},1500);
      }else{
        setTimeout(()=>{$('dTapNext').style.animation='fadeIn 0.5s 1.2s ease forwards'},1200);
      }
      // Burst
      spawnBurst(W/2,H*0.2,50);
    },800);
  }

  // Click to go from page2 to page3 (if blessing text is long)
  function goToPage3(){
    if(currentPhase!=='blessing'||!hasPage3)return;
    currentPhase='page3';
    $('page2').style.transition='opacity 0.8s ease';
    $('page2').style.opacity='0';
    setTimeout(()=>{
      $('page2').classList.remove('show');$('page2').style.opacity='';$('page2').style.transition='';
      $('page3').classList.add('show');
      setTimeout(()=>{$('p3Heart').style.animation='popIn 0.6s ease forwards'},100);
      setTimeout(()=>{$('p3Blessing').style.animation='slideInUp 0.6s 0.2s ease forwards'},300);
      setTimeout(()=>{$('p3Sender').style.animation='slideInUp 0.6s 0.6s ease forwards'},700);
      setTimeout(()=>{$('displayReplay').style.display='block';setTimeout(()=>$('displayReplay').classList.add('show'),100)},1200);
      spawnBurst(W/2,H*0.2,45);
    },800);
  }

  // Listen for clicks/taps on the display area
  $('displayMode').addEventListener('click',e=>{
    if(e.target.id==='displayReplay'||e.target.id==='displayMusic')return;
    if(currentPhase==='splash')goToBlessing();
    else if(currentPhase==='blessing'&&hasPage3)goToPage3();
  });

  // Auto-play music on first user interaction (browsers require user gesture)
  function tryAutoPlay(){
    startMusicLoop();
    document.removeEventListener('click',tryAutoPlay);
    document.removeEventListener('touchstart',tryAutoPlay);
  }
  // Try immediately (won't work on most mobile, but will on desktop if no autoplay policy)
  if(!startMusicLoop()){
    document.addEventListener('click',tryAutoPlay,{once:true});
    document.addEventListener('touchstart',tryAutoPlay,{once:true});
  }

  animate();
}

// Replay
$('displayReplay').addEventListener('click',()=>{
  if(displayAnim)cancelAnimationFrame(displayAnim);
  stopMusicLoop();
  startDisplayMode();
});

// Music - loop version
const NOTES=[262,262,294,262,349,330,262,262,294,262,392,349,262,262,523,440,349,330,294,466,466,440,349,392,349];
const DURS=[0.3,0.15,0.45,0.45,0.45,0.9,0.3,0.15,0.45,0.45,0.45,0.9,0.3,0.15,0.45,0.45,0.45,0.45,0.9,0.3,0.15,0.45,0.45,0.45,0.9];
let musicLoopTimer=null;

function getTotalDuration(){let t=0;DURS.forEach(d=>t+=d);return t}
const TOTAL_DUR=getTotalDuration();

function playOneCycle(){
  if(!musicPlaying||!audioCtx)return;
  if(audioCtx.state==='suspended'){audioCtx.resume()}
  let time=audioCtx.currentTime+0.1;
  NOTES.forEach((freq,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.12,time);
    g.gain.exponentialRampToValueAtTime(0.01,time+DURS[i]*0.9);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(time);o.stop(time+DURS[i]);
    time+=DURS[i];
  });
  // Schedule next cycle
  musicLoopTimer=setTimeout(()=>{
    if(musicPlaying)playOneCycle();
  },TOTAL_DUR*1000+200);
}

function startMusicLoop(){
  if(musicPlaying)return false;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    musicPlaying=true;
    $('displayMusic').classList.add('playing');
    playOneCycle();
    return true;
  }catch{return false}
}

function stopMusicLoop(){
  musicPlaying=false;
  clearTimeout(musicLoopTimer);
  if(audioCtx){try{audioCtx.close()}catch{};audioCtx=null}
  $('displayMusic').classList.remove('playing');
}

$('displayMusic').addEventListener('click',function(e){
  e.stopPropagation();
  if(musicPlaying)stopMusicLoop();
  else startMusicLoop();
});

/* ===== INIT ===== */
if(isDisplayMode){startDisplayMode()}
else{initThemes();selectTheme(0)}

})();
</script>
